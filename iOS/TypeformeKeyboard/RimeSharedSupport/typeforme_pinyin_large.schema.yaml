# Rime schema
# encoding: utf-8

schema:
  schema_id: typeforme_pinyin_large
  name: Typeforme 拼音大词库
  version: '0.4'
  author:
    - Typeforme
  description: |
    Typeforme screen keyboard schema backed by librime and the bundled
    Typeforme pinyin dictionary.

switches:
  - name: ascii_mode
    reset: 0
    states: [ 中文, 西文 ]
  - name: full_shape
    states: [ 半角, 全角 ]
  - name: ascii_punct
    states: [ 。，, ．， ]

menu:
  page_size: 9

engine:
  processors:
    - ascii_composer
    - recognizer
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - table_translator@custom_phrase
    - table_translator@english_word
    - script_translator
  filters:
    - uniquifier

speller:
  alphabet: zyxwvutsrqponmlkjihgfedcba
  delimiter: " '"
  algebra:
    - erase/^xx$/
    - erase/^hm$/
    - erase/^m$/
    - erase/^n$/
    - erase/^ng$/
    - abbrev/^([a-z]).+$/$1/
    - abbrev/^([zcs]h).+$/$1/

translator:
  dictionary: typeforme_pinyin_large
  enable_completion: true
  enable_correction: true
  enable_encoder: true
  enable_sentence: true
  enable_user_dict: true
  spelling_hints: 5
  preedit_format:
    - xform/([nl])v/$1ü/
    - xform/([nl])ue/$1üe/
    - xform/([jqxy])v/$1u/

custom_phrase:
  dictionary: ""
  user_dict: typeforme_custom_phrase
  db_class: stabledb
  enable_completion: false
  enable_sentence: false
  initial_quality: 99

english_word:
  dictionary: typeforme_english
  enable_completion: false
  enable_sentence: false
  enable_user_dict: false
  initial_quality: 0.4

punctuator:
  half_shape:
    ',': '，'
    '.': '。'
    '<': '《'
    '>': '》'
    '/': '、'
    '?': '？'
    ';': '；'
    ':': '：'
    "'": '’'
    '"': '”'
    '\': '、'
    '|': '·'
    '`': '｀'
    '~': '～'
    '!': '！'
    '@': '@'
    '#': '#'
    '%': '%'
    '$': '￥'
    '^': '……'
    '&': '&'
    '*': '*'
    '(': '（'
    ')': '）'
    '-': '-'
    '_': '——'
    '+': '+'
    '=': '='
  full_shape:
    ' ': { commit: '　' }

recognizer:
  patterns:
    email: "^[a-z][-_.0-9a-z]*@.*$"
    uppercase: "[A-Z][-_+.'0-9A-Za-z]*$"
    url: "^(www[.]|https?:|ftp[.:]|mailto:|file:).*$|^[a-z]+[.].+$"
