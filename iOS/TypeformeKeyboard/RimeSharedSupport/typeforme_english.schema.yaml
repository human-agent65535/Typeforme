# Rime schema
# encoding: utf-8

schema:
  schema_id: typeforme_english
  name: Typeforme English
  version: '0.1'
  author:
    - Typeforme
  description: |
    Build-only English table schema used by Typeforme's mixed Chinese/English
    input translator.

menu:
  page_size: 9

engine:
  processors:
    - ascii_composer
    - speller
    - selector
    - navigator
    - express_editor
  segmentors:
    - abc_segmentor
    - fallback_segmentor
  translators:
    - table_translator
  filters:
    - uniquifier

translator:
  dictionary: typeforme_english
  enable_completion: false
  enable_sentence: false
  enable_user_dict: false
