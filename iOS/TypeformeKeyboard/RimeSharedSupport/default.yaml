# Rime default settings for Typeforme's keyboard extension.
# encoding: utf-8

config_version: '0.1'

schema_list:
  - schema: typeforme_pinyin
  - schema: typeforme_pinyin_ext
  - schema: typeforme_pinyin_large

menu:
  page_size: 8

punctuator:
  full_shape:
    ' ' : { commit: 'гҖҖ' }
    ',' : { commit: пјҢ }
    '.' : { commit: гҖӮ }
    '<' : [ гҖҠ, гҖҲ, В«, вҖ№ ]
    '>' : [ гҖӢ, гҖү, В», вҖә ]
    '/' : [ пјҸ, Г· ]
    '?' : { commit: пјҹ }
    ';' : { commit: пјӣ }
    ':' : { commit: пјҡ }
    '''' : { pair: [ 'вҖҳ', 'вҖҷ' ] }
    '"' : { pair: [ 'вҖң', 'вҖқ' ] }
    '\' : [ гҖҒ, пјј ]
    '|' : [ гғ», пҪң, 'В§', 'ВҰ' ]
    '`' : пҪҖ
    '~' : [ гҖң, пҪһ, гҖ° ]
    '!' : { commit: пјҒ }
    '@' : [ пј , вҳҜ ]
    '#' : [ пјғ, вҢҳ ]
    '%' : [ пј…, 'В°', 'в„ғ' ]
    '$' : [ пҝҘ, '$', 'вӮ¬', 'ВЈ', 'ВҘ', 'Вў', 'ВӨ' ]
    '^' : { commit: вҖҰвҖҰ }
    '&' : пјҶ
    '*' : [ пјҠ, гғ», В·, Г—, вҖ», вқӮ ]
    '(' : пјҲ
    ')' : пјү
    '-' : пјҚ
    '_' : вҖ”вҖ”
    '+' : пјӢ
    '=' : пјқ
    '[' : [ гҖҢ, гҖҗ, гҖ”, пј» ]
    ']' : [ гҖҚ, гҖ‘, гҖ•, пјҪ ]
    '{' : [ гҖҺ, гҖ–, пҪӣ ]
    '}' : [ гҖҸ, гҖ—, пҪқ ]
  half_shape:
    ',' : { commit: пјҢ }
    '.' : { commit: гҖӮ }
    '<' : [ гҖҠ, гҖҲ, В«, вҖ№ ]
    '>' : [ гҖӢ, гҖү, В», вҖә ]
    '/' : [ гҖҒ, '/', пјҸ, Г· ]
    '?' : { commit: пјҹ }
    ';' : { commit: пјӣ }
    ':' : { commit: пјҡ }
    '''' : { pair: [ 'вҖҳ', 'вҖҷ' ] }
    '"' : { pair: [ 'вҖң', 'вҖқ' ] }
    '\' : [ гҖҒ, '\', пјј ]
    '|' : [ гғ», '|', пҪң, 'В§', 'ВҰ' ]
    '`' : '`'
    '~' : [ '~', гҖң, пҪһ, гҖ° ]
    '!' : { commit: пјҒ }
    '@' : '@'
    '#' : '#'
    '%' : [ '%', пј…, 'В°', 'в„ғ' ]
    '$' : [ пҝҘ, '$', 'вӮ¬', 'ВЈ', 'ВҘ', 'Вў', 'ВӨ' ]
    '^' : { commit: вҖҰвҖҰ }
    '&' : '&'
    '*' : [ '*', пјҠ, гғ», В·, Г—, вҖ», вқӮ ]
    '(' : пјҲ
    ')' : пјү
    '-' : '-'
    '_' : вҖ”вҖ”
    '+' : '+'
    '=' : '='
    '[' : [ гҖҢ, гҖҗ, гҖ”, пј» ]
    ']' : [ гҖҚ, гҖ‘, гҖ•, пјҪ ]
    '{' : [ гҖҺ, гҖ–, пҪӣ ]
    '}' : [ гҖҸ, гҖ—, пҪқ ]

key_binder:
  bindings:
    - { when: composing, accept: Control+p, send: Up }
    - { when: composing, accept: Control+n, send: Down }
    - { when: composing, accept: Control+b, send: Left }
    - { when: composing, accept: Control+f, send: Right }
    - { when: composing, accept: Control+a, send: Home }
    - { when: composing, accept: Control+e, send: End }
    - { when: composing, accept: Control+d, send: Delete }
    - { when: composing, accept: Control+k, send: Shift+Delete }
    - { when: composing, accept: Control+g, send: Escape }
    - { when: composing, accept: Alt+v, send: Page_Up }
    - { when: composing, accept: Control+v, send: Page_Down }
    - { when: composing, accept: ISO_Left_Tab, send: Shift+Left }
    - { when: composing, accept: Shift+Tab, send: Shift+Left }
    - { when: composing, accept: Tab, send: Shift+Right }
    - { when: paging, accept: minus, send: Page_Up }
    - { when: has_menu, accept: equal, send: Page_Down }
    - { when: paging, accept: comma, send: Page_Up }
    - { when: has_menu, accept: period, send: Page_Down }
    - { when: always, accept: Control+Shift+1, select: .next }
    - { when: always, accept: Control+Shift+2, toggle: ascii_mode }
    - { when: always, accept: Control+Shift+3, toggle: full_shape }
    - { when: always, accept: Control+Shift+4, toggle: simplification }
    - { when: always, accept: Control+Shift+5, toggle: extended_charset }
    - { when: always, accept: Shift+space, toggle: full_shape }
    - { when: always, accept: Control+period, toggle: ascii_punct }

recognizer:
  patterns:
    email: "^[a-z][-_.0-9a-z]*@.*$"
    uppercase: "[A-Z][-_+.'0-9A-Za-z]*$"
    url: "^(www[.]|https?:|ftp:|mailto:).*$|^[a-z]+[.].+$"

switcher:
  caption: гҖ”ж–№жЎҲйҒёе–®гҖ•
  hotkeys:
    - Control+grave
    - Control+Shift+grave
    - F4
  save_options:
    - full_shape
    - ascii_punct
  fold_options: true
  abbreviate_options: true
  option_list_separator: 'пјҸ'

ascii_composer:
  good_old_caps_lock: true
  switch_key:
    Shift_L: inline_ascii
    Shift_R: commit_text
    Control_L: noop
    Control_R: noop
    Caps_Lock: clear
    Eisu_toggle: clear
